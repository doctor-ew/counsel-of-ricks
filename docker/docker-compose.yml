version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: courtprep-db
    environment:
      POSTGRES_USER: depo
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: deposition_prep
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U depo -d deposition_prep"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
