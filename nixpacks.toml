[phases.setup]
nixPkgs = ["python313", "nodejs_22"]

# Nixpacks auto-installs Python deps from requirements.txt — don't override.
# Only add bun (for the frontend build) on top of what Nixpacks provides.
[phases.install]
cmds = ["npm install -g bun"]

[phases.build]
cmds = ["cd frontend && bun install && bun run build && cd .."]

[start]
cmd = "python scripts/migrate.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2"
